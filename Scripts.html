    // CÁLCULO SÊNIOR DE SLA (DIAS ÚTEIS E FERIADOS DO RJ E NITERÓI)
    function calcularDiasUteis(dataStr) {
        try {
            if (!dataStr) return 0;
            // Extrai a data milimetricamente no padrão brasileiro DD/MM/YYYY
            const match = dataStr.match(/(\d{2})\/(\d{2})\/(\d{4})/);
            if (!match) return 0;
            
            const d = parseInt(match[1], 10);
            const m = parseInt(match[2], 10) - 1; // Meses no JS começam em 0
            const y = parseInt(match[3], 10);
            
            let tempDate = new Date(y, m, d);
            tempDate.setHours(0,0,0,0);
            
            const dataAtual = new Date();
            dataAtual.setHours(0,0,0,0);
            
            // Se a data de entrada for no futuro ou hoje, os dias úteis passados são 0
            if (tempDate.getTime() >= dataAtual.getTime()) return 0;
            
            let diasUteis = 0;
            
            // Feriados Nacionais, Estaduais (RJ) e Municipais (Niterói)
            const feriadosFixos = [
                "01/01", // Ano Novo
                "21/04", // Tiradentes
                "23/04", // São Jorge (Estadual RJ)
                "01/05", // Dia do Trabalhador
                "24/06", // São João Batista (Niterói)
                "07/09", // Independência do Brasil
                "12/10", // Nossa Senhora Aparecida
                "02/11", // Finados
                "15/11", // Proclamação da República
                "20/11", // Consciência Negra (Estadual RJ/Nacional)
                "22/11", // Aniversário de Niterói
                "25/12"  // Natal
            ];

            // Feriados Móveis Exatos para 2026
            const feriadosMoveis2026 = [
                "16/02/2026", // Carnaval (Segunda)
                "17/02/2026", // Carnaval (Terça)
                "18/02/2026", // Quarta de Cinzas
                "03/04/2026", // Paixão de Cristo
                "04/06/2026"  // Corpus Christi
            ];
            
            // Loop cravado para adicionar dias até atingir a data atual
            let limiter = 0;
            while (tempDate.getTime() < dataAtual.getTime() && limiter < 1500) {
                limiter++;
                tempDate.setDate(tempDate.getDate() + 1);
                
                const diaSemana = tempDate.getDay();
                if (diaSemana === 0 || diaSemana === 6) continue; // Pula Fim de Semana (0 = Dom, 6 = Sáb)
                
                const diaF = String(tempDate.getDate()).padStart(2, '0');
                const mesF = String(tempDate.getMonth() + 1).padStart(2, '0');
                const anoF = tempDate.getFullYear();
                const dm = `${diaF}/${mesF}`;
                const dma = `${diaF}/${mesF}/${anoF}`;
                
                if (feriadosFixos.includes(dm) || feriadosMoveis2026.includes(dma)) continue; // Pula Feriados
                
                diasUteis++;
            }
            return diasUteis;
        } catch(e) {
            return 0; // Fallback anti-quebra
        }
    }

    function formatarMoedaBRL(valor) { if (!valor) return 'Sem FIPE'; let str = String(valor).replace(/R\$\s?/gi, '').trim(); if (str === '') return 'Sem FIPE'; if (str.indexOf(',') > -1) { str = str.replace(/\./g, '').replace(',', '.'); } let num = parseFloat(str); if (isNaN(num)) return '💰 R$ ' + String(valor).replace(/R\$\s?/gi, '').trim(); return '💰 R$ ' + new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num); }

    function aplicarFiltrosCancelamento() {
      const ipt = document.getElementById('ipt-busca-canc');
      const termo = ipt ? ipt.value.toLowerCase().trim() : "";
      const fStatus = document.getElementById('filtroStatusCanc') ? document.getElementById('filtroStatusCanc').value : 'alvos';
      
      cacheFilaCancFiltrada = cacheFilaCancBase.filter(c => {
        const sit = String(c.codSituacao).toUpperCase();
        
        if (fStatus === 'alvos') {
           if (sit !== "CANCELADO" && sit !== "CANCELAMENTO PENDENTE") return false;
        }
        
        if (termo !== "") {
           const n = String(c.nome || "").toLowerCase();
           const p = String(c.placa || "").toLowerCase().replace(/[^a-z0-9]/g, '');
           const ch = String(c.chassi || "").toLowerCase().replace(/[^a-z0-9]/g, '');
           if (!n.includes(termo) && !p.includes(termo.replace(/[^a-z0-9]/g, '')) && !ch.includes(termo) && !sit.toLowerCase().includes(termo)) {
             return false;
           }
        }
        return true;
      });
      desenharTabelaCancelamento();
    }

    function desenharTabelaCancelamento() {

        let cNC = "text-slate-800 dark:text-slate-100";
        let nomeHtml = `<div class="truncate max-w-[200px] font-bold ${cNC}" title="${cli.nome}">${cli.nome || "-"}</div>${badgeSGA}`;

        let fD = formatarMoedaBRL(cli.fipe);
        let vD = cli.placa ? cli.placa : (cli.chassi ? cli.chassi : "-");
        let veiculoHtml = `${vD}<br><span class="text-[11px] bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 px-2 py-0.5 rounded-md font-black mt-1 block w-max text-slate-800 dark:text-slate-200 shadow-sm">${fD}</span>`;
        
        let htmlDisparos = `<div class="flex items-center justify-center gap-2">`; 
        let tD = false;
        if (cli.isEnviado) { htmlDisparos += `<span class="text-[17px] cursor-help hover:scale-125 transition drop-shadow-sm" title="📧 E-mail:\n${cli.dataEmail || ''}">📧</span>`; tD = true; }

        let htmlLocalizacao = `<div class="cursor-help font-black text-[13px] whitespace-nowrap text-slate-700 dark:text-slate-300" title="${tooltipEnd}">📍 ${cli.estado || "N/A"}</div>`;

        let fE = cli.email || "-";
        let contatoHtml = `${fE}<br>${gerarLinkWhats(cli.telefone, cli.mensagemWhatsApp)}`;

        const isAlvoPermitido = (sitTextOriginal === "CANCELADO" || sitTextOriginal === "CANCELAMENTO PENDENTE");
        const jaEnviouTudo = (cli.isEnviado && cli.isWhatsEnviado);

    async function rodarAutomacaoCanc(comando) {
      const alvos = cacheFilaCancBase.filter(c => selectionSetCanc.has(c.idUnico));

    function aplicarFiltrosEOrdenacao() {
      const fS = document.getElementById('filtroFila') ? document.getElementById('filtroFila').value : "pendentes";
      const fE = document.getElementById('filtroEtapa') ? document.getElementById('filtroEtapa').value : "todas";
      const fT = document.getElementById('filtroTrava') ? document.getElementById('filtroTrava').value : "todos";
      
      const iptBusca = document.getElementById('ipt-busca-fila');
      const termoBusca = iptBusca ? iptBusca.value.toLowerCase().trim() : "";
      const termoBuscaLimpo = termoBusca.replace(/[^a-z0-9]/g, '');

      cacheFilaFiltrada = cacheFilaBase.filter(c => {
        if (fE !== "todas" && String(c.etapaNum) !== fE) return false;
        if (fT === "livres" && c.isTecnicoIndisp) return false;
        if (fT === "travados" && !c.isTecnicoIndisp) return false;
        if (fS === "pendentes") { if (c.isEnviado || c.isErroEmail || c.isInativo) return false; } 
        else if (fS === "erros") { if (!c.isErroEmail) return false; } 
        else if (fS === "inativos") { if (!c.isInativo) return false; } 
        else if (fS === "enviados") { if (!c.isEnviado) return false; }

        if (termoBusca !== "") {
           const nomeStr = String(c.nome || "").toLowerCase();
           const placaLimpa = String(c.placa || "").toLowerCase().replace(/[^a-z0-9]/g, '');
           const chassiLimpo = String(c.chassi || "").toLowerCase().replace(/[^a-z0-9]/g, '');
           if (!nomeStr.includes(termoBusca) && !placaLimpa.includes(termoBuscaLimpo) && !chassiLimpo.includes(termoBuscaLimpo)) return false;
        }
        return true;
      });

      cacheFilaFiltrada.sort((a, b) => { 
        if (colunaOrdenacao === 'dataPlanilha') return ordemAscendente ? getTimestamp(a.dataPlanilha) - getTimestamp(b.dataPlanilha) : getTimestamp(b.dataPlanilha) - getTimestamp(a.dataPlanilha); 
        if (colunaOrdenacao === 'etapaNum') return ordemAscendente ? a.etapaNum - b.etapaNum : b.etapaNum - a.etapaNum; 
        let valA = (a[colunaOrdenacao] || "").toString().toLowerCase(), valB = (b[colunaOrdenacao] || "").toString().toLowerCase(); 
        if (valA < valB) return ordemAscendente ? -1 : 1;

        return 0;

    function sanitizarValorMoeda(valor) {
        if (!valor) return "";
        let v = valor.toString().trim();
        if (v.toUpperCase().includes("R$")) {
            v = v.replace(/R\$\s?/gi, '');
            v = v.replace(/\./g, '');
            v = v.replace(',', '.');
            const num = parseFloat(v);
            return isNaN(num) ? valor : num;
        }
        return valor;
    }

    function processarArquivoImportacao() {
        const fileInput = document.getElementById('arquivoImportacao');
        const btnImportar = document.getElementById('btnImportarArquivo');

        if (!fileInput.files || fileInput.files.length === 0) {
            mostrarStatus('Erro de Validação: Por favor, selecione o arquivo XLS ou HTM primeiro.', 'erro');
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        mostrarStatus('🔄 FASE 1/2: Extraindo dados com filtro Regex...', 'info');
        desativarBotao(btnImportar);

        reader.onload = function(e) {
            try {
                const conteudoHtml = e.target.result;
                const parser = new DOMParser();
                const doc = parser.parseFromString(conteudoHtml, 'text/html');
                const tabela = doc.querySelector('table');

                if (!tabela) {
                    mostrarStatus('Erro Crítico: Nenhuma tabela detectada no arquivo.', 'erro');
                    restaurarBotao(btnImportar);
                    return;
                }

                const linhasHtml = Array.from(tabela.querySelectorAll('tr'));
                const matrizTratada = linhasHtml.map(tr => Array.from(tr.querySelectorAll('th, td')).map(td => td.innerText.trim()));

                const dadosParaImportar = [];
                const dateRegex = /(\d{2}\/\d{2}\/\d{4})/; 

                for (let i = 0; i < matrizTratada.length; i++) {
                    const colunas = matrizTratada[i];
                    if (colunas.length < 5) continue; 
                    const colA = colunas[0] ? colunas[0].trim() : "";
                    const colB = colunas[1] ? colunas[1].trim() : "";
                    if (colA.toUpperCase().includes("ZEN SEGUROS") || colB.toUpperCase() === "NOME" || colB.toUpperCase() === "CLIENTE") continue;

                    let dataExtraida = "";
                    const matchData = colA.match(dateRegex);
                    if (matchData) {
                        dataExtraida = matchData[1];
                    } else if (colA.length === 10 && colA.includes('/')) {
                        dataExtraida = colA; 
                    }

                    if (!colB) continue;

                    dadosParaImportar.push({
                        dataPlanilha: dataExtraida,
                        nome: colunas[1] || "",
                        placa: colunas[2] || "",
                        chassi: colunas[3] || "",
                        fipe: sanitizarValorMoeda(colunas[4] || ""),
                        email: colunas[5] || "",
                        telefone: colunas[6] || "",
                        estado: colunas[7] || "",
                        cidade: colunas[8] || "",
                        bairro: colunas[9] || ""
                    });
                }
                enviarParaTriagem(dadosParaImportar, btnImportar, fileInput);

            } catch (error) {
                mostrarStatus(`Falha no processamento: ${error.message}`, 'erro');
                restaurarBotao(btnImportar);
            }
        };
        reader.readAsText(file, 'ISO-8859-1');
    }

    // EXTRAÇÃO "FATIADOR DE BLOCOS DE 10" PARA O COLAR TEXTO
    function processarPastedData() {
        const txtPasted = document.getElementById('txtPastedSGA').value.trim();
        const btnAnalisar = document.getElementById('btnAnalisarTexto');

        if (!txtPasted) {
            mostrarStatus('Erro: A área de texto está vazia.', 'erro');
            return;
        }

        mostrarStatus('🔄 FASE 1/2: Extraindo blocos de texto (10 em 10)...', 'info');
        desativarBotao(btnAnalisar);

        try {
            const linhasBrutas = txtPasted.split('\n').map(l => l.trim()).filter(l => l !== '');
            const dadosParaImportar = [];
            const dateRegex = /(\d{2}\/\d{2}\/\d{4})/;

            let i = 0;
            while (i < linhasBrutas.length) {
                // Procura o início de um bloco de cliente (uma linha que contenha Data)
                if (dateRegex.test(linhasBrutas[i])) {
                    // Garante que existem pelo menos as 9 linhas subsequentes que compõem o cliente
                    if (i + 9 < linhasBrutas.length) {
                        let dataExtraida = "";
                        const matchData = linhasBrutas[i].match(dateRegex);
                        if (matchData) dataExtraida = matchData[1];

                        dadosParaImportar.push({
                            dataPlanilha: dataExtraida,                          // 0
                            nome: linhasBrutas[i + 1],                           // 1
                            placa: linhasBrutas[i + 2],                          // 2
                            chassi: linhasBrutas[i + 3],                         // 3
                            fipe: sanitizarValorMoeda(linhasBrutas[i + 4]),      // 4
                            email: linhasBrutas[i + 5],                          // 5
                            telefone: linhasBrutas[i + 6],                       // 6
                            estado: linhasBrutas[i + 7],                         // 7
                            cidade: linhasBrutas[i + 8],                         // 8
                            bairro: linhasBrutas[i + 9]                          // 9
                        });
                        i += 10; // Avança para o próximo bloco de cliente
                    } else {
                        break; // Fim do texto (incompleto)
                    }
                } else {
                    i++; // Pula cabeçalhos perdidos ou lixo até achar uma Data
                }
            }

            enviarParaTriagem(dadosParaImportar, btnAnalisar, null);

        } catch (error) {
            mostrarStatus(`Falha no processamento do texto: ${error.message}`, 'erro');
            restaurarBotao(btnAnalisar);
        }
    }

    function enviarParaTriagem(dadosParaImportar, botaoAtivo, inputParaLimpar) {

        google.script.run

                restaurarBotao(botaoAtivo);
                mostrarStatus(`❌ Erro de Comunicação com Backend: ${erro.message}`, 'erro');
            })

          if (VIEW_PARAM === 'fila') { document.getElementById('sidebar').classList.add('hidden'); navegarFila(null); } 
          else if (VIEW_PARAM === 'dash') { document.getElementById('sidebar').classList.add('hidden'); navegar('tela-dashboard', null); } 
          else { navegar('tela-manual', document.getElementById('btn-nav-manual')); }
      }
      setTimeout(verificarStatusAPIs, 1000); 
    };

    function verificarStatusAPIs() {
      const dotHinova = document.getElementById('dot-hinova'), hoverHinova = document.getElementById('hover-hinova'), dotViaCep = document.getElementById('dot-viacep'), hoverViaCep = document.getElementById('hover-viacep');
      if(!dotHinova || !dotViaCep) return;
      dotHinova.className = "w-3 h-3 rounded-full bg-slate-400 animate-pulse shadow-sm cursor-wait"; hoverHinova.innerHTML = "<div class='flex items-center gap-2 mb-1'><span class='text-slate-400'>📡</span> <b>Hinova (SGA)</b></div><span class='text-slate-400'>Aguardando...</span>";
      dotViaCep.className = "w-3 h-3 rounded-full bg-slate-400 animate-pulse shadow-sm cursor-wait"; hoverViaCep.innerHTML = "<div class='flex items-center gap-2 mb-1'><span class='text-slate-400'>📮</span> <b>ViaCEP</b></div><span class='text-slate-400'>Aguardando...</span>";

      const startViaCep = performance.now();
      fetch('https://viacep.com.br/ws/01001000/json/').then(res => { const t = Math.round(performance.now() - startViaCep); if (res.ok) { dotViaCep.className = "w-3 h-3 rounded-full bg-emerald-500 shadow-md shadow-emerald-500/40"; hoverViaCep.innerHTML = `<div class='flex items-center gap-2 mb-1'><span class='text-emerald-400'>🟢</span> <b>ViaCEP Online</b></div><div class='mt-2 text-[10px] text-emerald-400/70 font-mono'>Ping: ${t}ms</div>`; } else throw new Error(res.status); }).catch(e => { dotViaCep.className = "w-3 h-3 rounded-full bg-rose-500 shadow-md shadow-rose-500/40 animate-bounce"; hoverViaCep.innerHTML = `<div class='flex items-center gap-2 mb-1'><span class='text-rose-500'>🔴</span> <b>ViaCEP Offline</b></div>`; });
      google.script.run.withSuccessHandler(res => { if (res && res.hinova) { dotHinova.className = "w-3 h-3 rounded-full bg-emerald-500 shadow-md shadow-emerald-500/40"; hoverHinova.innerHTML = `<div class='flex items-center gap-2 mb-1'><span class='text-emerald-400'>🟢</span> <b>Hinova (SGA)</b></div><div class='mt-2 text-[10px] text-emerald-400/70 font-mono'>Ping: ${res.tempo}ms</div>`; } else { dotHinova.className = "w-3 h-3 rounded-full bg-rose-500 shadow-md shadow-rose-500/40 animate-bounce"; hoverHinova.innerHTML = `<div class='flex items-center gap-2 mb-1'><span class='text-rose-500'>🔴</span> <b>Hinova Falhou</b></div>`; } }).web_testarAPIs();
    }
</script>
